[build]
  command = "npm run build"
  publish = "out"
  # Next.js Runtimeを無効化（静的エクスポートには不要）
  [build.environment]
    NETLIFY_NEXT_PLUGIN_SKIP = "true"

# キャッシュ設定: 静的アセットは長期キャッシュ
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML は短いキャッシュ（更新反映のため）
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# RSC payload も短いキャッシュ
[[headers]]
  for = "/*.txt"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
